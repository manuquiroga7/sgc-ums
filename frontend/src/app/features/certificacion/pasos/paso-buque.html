<p class="text-sm text-ums-on-surface-variant mb-4">
  Seleccioná el buque a certificar o registrá uno nuevo.
</p>

<!-- Barra: buscador + nuevo -->
<div class="flex items-center gap-3 mb-4">
  <div class="relative flex-1">
    <svg class="h-4 w-4 text-ums-outline absolute left-3 top-1/2 -translate-y-1/2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="7" /><path d="m21 21-4.3-4.3" stroke-linecap="round" />
    </svg>
    <input type="search" [ngModel]="filtro()" (ngModelChange)="filtro.set($event)"
      placeholder="Buscar por nombre, IMO o bandera…"
      class="w-full rounded border border-ums-outline-variant pl-9 pr-3 py-2 text-sm outline-none focus:border-ums-primary focus:ring-2 focus:ring-ums-primary/20" />
  </div>
  <button type="button" (click)="abrirNuevo()"
    class="shrink-0 inline-flex items-center gap-2 rounded bg-ums-secondary px-4 py-2 text-sm font-semibold text-ums-on-secondary hover:bg-ums-secondary-container transition">
    <svg class="h-[18px] w-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 5v14m-7-7h14" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
    Registrar buque
  </button>
</div>

@if (loading()) {
  <p class="text-sm text-ums-on-surface-variant py-8 text-center">Cargando buques…</p>
} @else {
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
    @for (b of filtrados(); track b.id_buque) {
      <button type="button" (click)="seleccionar(b)" (dblclick)="seleccionarYAvanzar(b)"
        class="text-left rounded-lg border-2 bg-white p-4 transition"
        [class.border-ums-primary]="store.buque()?.id_buque === b.id_buque"
        [class.ring-2]="store.buque()?.id_buque === b.id_buque"
        [class.ring-ums-primary]="store.buque()?.id_buque === b.id_buque"
        [class.border-ums-outline-variant]="store.buque()?.id_buque !== b.id_buque"
        [class.hover:border-ums-primary]="store.buque()?.id_buque !== b.id_buque">
        <div class="flex items-center justify-between gap-2">
          <h3 class="text-sm font-bold text-ums-on-surface">{{ b.nombre }}</h3>
          @if (store.buque()?.id_buque === b.id_buque) {
            <svg class="h-4 w-4 text-ums-primary shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="m5 12 5 5 9-11" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          }
        </div>
        <p class="text-xs text-ums-on-surface-variant mt-1">
          {{ b.bandera || '—' }} · IMO <span class="font-mono">{{ b.numero_imo || '—' }}</span>
        </p>
      </button>
    }
  </div>
  @if (filtrados().length === 0) {
    <p class="text-sm text-ums-on-surface-variant py-6 text-center">No hay buques que coincidan.</p>
  }
}

<!-- Modal registrar buque -->
@if (showForm()) {
  <div class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/40" (click)="showForm.set(false)"></div>
    <div class="relative w-full max-w-lg bg-white rounded-lg shadow-xl">
      <div class="h-1 bg-ums-primary rounded-t"></div>
      <form (ngSubmit)="guardarNuevo()" #f="ngForm" class="p-6">
        <h2 class="text-lg font-bold text-ums-on-surface mb-4">Registrar buque</h2>
        <div class="space-y-4">
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wide text-ums-on-surface-variant mb-1">Nombre <span class="text-ums-danger">*</span></label>
            <input name="nombre" [(ngModel)]="nuevo.nombre" required placeholder="ej. LIGNUM WEB"
              class="w-full rounded border border-ums-outline-variant px-3 py-2 text-sm outline-none focus:border-ums-primary focus:ring-2 focus:ring-ums-primary/20" />
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-semibold uppercase tracking-wide text-ums-on-surface-variant mb-1">Bandera</label>
              <input name="bandera" [(ngModel)]="nuevo.bandera" placeholder="ej. Panamá"
                class="w-full rounded border border-ums-outline-variant px-3 py-2 text-sm outline-none focus:border-ums-primary focus:ring-2 focus:ring-ums-primary/20" />
            </div>
            <div>
              <label class="block text-xs font-semibold uppercase tracking-wide text-ums-on-surface-variant mb-1">N° IMO</label>
              <input name="numero_imo" [(ngModel)]="nuevo.numero_imo" placeholder="ej. 9973054"
                class="w-full rounded border border-ums-outline-variant px-3 py-2 text-sm outline-none focus:border-ums-primary focus:ring-2 focus:ring-ums-primary/20" />
            </div>
          </div>
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wide text-ums-on-surface-variant mb-1">Call Sign</label>
            <input name="call_sign" [(ngModel)]="nuevo.call_sign" placeholder="ej. 3E4742"
              class="w-full rounded border border-ums-outline-variant px-3 py-2 text-sm outline-none focus:border-ums-primary focus:ring-2 focus:ring-ums-primary/20" />
          </div>
        </div>
        @if (error()) {
          <div class="mt-4 rounded border border-ums-danger/30 bg-ums-danger/5 px-3 py-2 text-sm text-ums-danger">{{ error() }}</div>
        }
        <div class="flex justify-end gap-2 mt-6">
          <button type="button" (click)="showForm.set(false)"
            class="rounded px-4 py-2 text-sm font-semibold text-ums-on-surface-variant hover:bg-ums-surface-container transition">Cancelar</button>
          <button type="submit" [disabled]="saving() || f.invalid"
            class="rounded bg-ums-primary px-4 py-2 text-sm font-semibold text-ums-on-primary hover:bg-ums-primary-container transition disabled:opacity-60 disabled:cursor-not-allowed">
            {{ saving() ? 'Guardando…' : 'Guardar y seleccionar' }}
          </button>
        </div>
      </form>
    </div>
  </div>
}
