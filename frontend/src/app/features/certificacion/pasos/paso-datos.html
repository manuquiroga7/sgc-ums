<p class="text-sm text-ums-on-surface-variant mb-4">
  Completá los datos del certificado. El próximo servicio se calcula automáticamente según el intervalo del tipo.
</p>

<div class="bg-white border border-ums-outline-variant rounded-lg p-6 max-w-2xl">
  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
    <div>
      <label class="block text-xs font-semibold uppercase tracking-wide text-ums-on-surface-variant mb-1">N° de certificado</label>
      <input type="text" [ngModel]="store.datos().numero_certificado" name="numero_certificado" readonly
        class="w-full rounded border border-ums-outline-variant bg-ums-surface-low px-3 py-2 text-sm font-mono text-ums-on-surface outline-none" />
      <p class="text-[11px] text-ums-on-surface-variant mt-1">Asignado automáticamente al iniciar.</p>
    </div>
    <div>
      <label class="block text-xs font-semibold uppercase tracking-wide text-ums-on-surface-variant mb-1">Inspector</label>
      <input type="text" [ngModel]="store.datos().inspector" (ngModelChange)="store.patchDatos({ inspector: $event })"
        placeholder="ej. Sergio Hernández"
        class="w-full rounded border border-ums-outline-variant px-3 py-2 text-sm outline-none focus:border-ums-primary focus:ring-2 focus:ring-ums-primary/20" />
    </div>
    <div>
      <label class="block text-xs font-semibold uppercase tracking-wide text-ums-on-surface-variant mb-1">Fecha de emisión</label>
      <input type="date" [ngModel]="store.datos().fecha_emision" (ngModelChange)="store.patchDatos({ fecha_emision: $event })"
        class="w-full rounded border border-ums-outline-variant px-3 py-2 text-sm outline-none focus:border-ums-primary focus:ring-2 focus:ring-ums-primary/20" />
    </div>
    <div>
      <label class="block text-xs font-semibold uppercase tracking-wide text-ums-on-surface-variant mb-1">Próximo servicio</label>
      <input type="date" [ngModel]="store.datos().fecha_proximo_servicio" (ngModelChange)="store.patchDatos({ fecha_proximo_servicio: $event })"
        class="w-full rounded border border-ums-outline-variant px-3 py-2 text-sm outline-none focus:border-ums-primary focus:ring-2 focus:ring-ums-primary/20" />
    </div>
    <div>
      <label class="block text-xs font-semibold uppercase tracking-wide text-ums-on-surface-variant mb-1">Idioma del PDF</label>
      <select [ngModel]="store.datos().idioma" (ngModelChange)="store.patchDatos({ idioma: $event })"
        class="w-full rounded border border-ums-outline-variant px-3 py-2 text-sm bg-white outline-none focus:border-ums-primary">
        <option value="es">Español</option>
        <option value="en">Inglés</option>
      </select>
    </div>
  </div>

  <div class="mt-4">
    <label class="block text-xs font-semibold uppercase tracking-wide text-ums-on-surface-variant mb-1">Recomendaciones</label>
    <textarea rows="3" [ngModel]="store.datos().recomendaciones" (ngModelChange)="store.patchDatos({ recomendaciones: $event })"
      placeholder='"NIL" si no hay nada para mencionar'
      class="w-full rounded border border-ums-outline-variant px-3 py-2 text-sm outline-none focus:border-ums-primary focus:ring-2 focus:ring-ums-primary/20"></textarea>
  </div>
</div>
