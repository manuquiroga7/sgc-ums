<p class="text-sm text-ums-on-surface-variant mb-4">
  Elegí qué tipo de certificado vas a emitir. Esto define los campos que se cargan en cada ítem.
</p>

@if (loading()) {
  <p class="text-sm text-ums-on-surface-variant py-8 text-center">Cargando tipos…</p>
} @else {
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
    @for (t of tipos(); track t.id_tipo) {
      <button type="button" (click)="seleccionar(t)" [disabled]="!t.plantilla"
        class="text-left rounded-lg border-2 bg-white p-5 transition disabled:cursor-not-allowed disabled:opacity-60"
        [class.border-ums-primary]="store.tipo()?.id_tipo === t.id_tipo"
        [class.ring-2]="store.tipo()?.id_tipo === t.id_tipo"
        [class.ring-ums-primary]="store.tipo()?.id_tipo === t.id_tipo"
        [class.border-ums-outline-variant]="store.tipo()?.id_tipo !== t.id_tipo"
        [class.hover:border-ums-primary]="!!t.plantilla && store.tipo()?.id_tipo !== t.id_tipo">
        <div class="flex items-start justify-between gap-2">
          <div class="h-10 w-10 rounded bg-ums-primary/10 text-ums-primary flex items-center justify-center shrink-0">
            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9zm0 0v6h6M9 13h6m-6 4h4" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </div>
          @if (store.tipo()?.id_tipo === t.id_tipo) {
            <span class="text-ums-primary">
              <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="m5 12 5 5 9-11" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </span>
          }
        </div>
        <h3 class="mt-3 text-[15px] font-bold text-ums-on-surface">{{ t.nombre }}</h3>
        @if (t.normativa_aplicable) {
          <p class="mt-1 text-xs text-ums-on-surface-variant">{{ t.normativa_aplicable }}</p>
        }
        @if (!t.plantilla) {
          <p class="mt-2 text-[11px] font-semibold uppercase tracking-wide text-ums-warning">Plantilla no definida</p>
        }
      </button>
    }
  </div>
}
