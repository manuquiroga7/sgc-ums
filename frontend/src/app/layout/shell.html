<div class="flex h-screen overflow-hidden bg-ums-surface">
  <!-- ───────── Sidebar ───────── -->
  <aside class="w-64 shrink-0 bg-white border-r border-ums-outline-variant flex flex-col">
    <!-- Marca -->
    <div class="flex items-center gap-3 px-5 h-[72px] border-b border-ums-outline-variant">
      <div class="h-9 w-9 rounded bg-ums-primary flex items-center justify-center shrink-0">
        <svg class="h-5 w-5 text-ums-on-primary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 21h18M5 21V7l7-4 7 4v14M9 21v-6h6v6" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </div>
      <div class="leading-tight">
        <p class="text-sm font-bold text-ums-primary">UMS Industrial</p>
        <p class="text-[10px] uppercase tracking-wider text-ums-on-surface-variant">Portal de Certificación</p>
      </div>
    </div>

    <!-- Navegación -->
    <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
      <!-- Página Principal (activa) -->
      <a
        routerLink="/"
        routerLinkActive="bg-ums-primary! text-ums-on-primary! hover:bg-ums-primary"
        [routerLinkActiveOptions]="{ exact: true }"
        class="flex items-center gap-3 rounded px-3 py-2 text-sm font-medium text-ums-on-surface-variant hover:bg-ums-surface-container transition">
        <svg class="h-[18px] w-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 10.5 12 3l9 7.5M5 9.5V21h14V9.5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        Página Principal
      </a>

      <!-- Historial (próximamente) -->
      <span class="flex items-center gap-3 rounded px-3 py-2 text-sm font-medium text-ums-outline cursor-not-allowed select-none" title="Disponible próximamente">
        <svg class="h-[18px] w-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 12a9 9 0 1 0 3-6.7L3 8m0-5v5h5M12 7v5l3 2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        Historial
      </span>

      <!-- Nueva Certificación (próximamente) -->
      <span class="flex items-center gap-3 rounded px-3 py-2 text-sm font-medium text-ums-outline cursor-not-allowed select-none" title="Disponible próximamente">
        <svg class="h-[18px] w-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9zm0 0v6h6M12 11v6m-3-3h6" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        Nueva Certificación
      </span>

      <!-- Ajustes (próximamente) -->
      <span class="flex items-center gap-3 rounded px-3 py-2 text-sm font-medium text-ums-outline cursor-not-allowed select-none" title="Disponible próximamente">
        <svg class="h-[18px] w-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3" />
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        Ajustes
      </span>
    </nav>

    <!-- Pie -->
    <div class="p-3 space-y-1">
      <button
        type="button"
        title="Disponible próximamente"
        class="w-full flex items-center justify-center gap-2 rounded bg-ums-secondary px-3 py-2.5 text-sm font-semibold text-ums-on-secondary hover:bg-ums-secondary-container transition">
        <svg class="h-[18px] w-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 3v12m0 0 4-4m-4 4-4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        Descargar Informes
      </button>

      <span class="flex items-center gap-3 rounded px-3 py-2 text-sm font-medium text-ums-outline cursor-not-allowed select-none" title="Disponible próximamente">
        <svg class="h-[18px] w-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="9" />
          <path d="M9.1 9a3 3 0 0 1 5.8 1c0 2-3 3-3 3M12 17h.01" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        Soporte
      </span>

      <button
        type="button"
        (click)="logout()"
        class="w-full flex items-center gap-3 rounded px-3 py-2 text-sm font-medium text-ums-on-surface-variant hover:bg-ums-surface-container transition">
        <svg class="h-[18px] w-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4m7 14 5-5-5-5m5 5H9" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        Cerrar Sesión
      </button>
    </div>
  </aside>

  <!-- ───────── Contenido ───────── -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- Topbar -->
    <header class="h-[72px] shrink-0 bg-white border-b border-ums-outline-variant flex items-center justify-between px-8 gap-6">
      <h2 class="text-lg font-bold text-ums-on-surface">Página Principal</h2>

      <div class="flex items-center gap-4">
        <!-- Buscador (decorativo por ahora) -->
        <div class="relative hidden sm:block">
          <svg class="h-4 w-4 text-ums-outline absolute left-3 top-1/2 -translate-y-1/2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="7" />
            <path d="m21 21-4.3-4.3" stroke-linecap="round" />
          </svg>
          <input
            type="search"
            disabled
            placeholder="Buscar certificados…"
            class="w-72 rounded-full bg-ums-surface-low border border-ums-outline-variant pl-9 pr-4 py-2 text-sm outline-none placeholder:text-ums-outline disabled:cursor-not-allowed" />
        </div>

        @if (user(); as u) {
          <div
            class="h-9 w-9 rounded-full bg-ums-primary-container flex items-center justify-center text-ums-on-primary text-sm font-semibold shrink-0"
            [title]="u.name + ' · ' + u.email">
            {{ u.name.charAt(0) }}
          </div>
        }
      </div>
    </header>

    <!-- Outlet -->
    <main class="flex-1 overflow-y-auto p-8">
      <router-outlet />
    </main>
  </div>
</div>
